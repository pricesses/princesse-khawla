<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}FielMedina Partners{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .toast { transition: opacity 0.5s ease, transform 0.5s ease; }
        .toast.hide { opacity: 0; transform: translateX(20px); }
    </style>
</head>
<body class="h-full bg-gray-50">

{% if messages %}
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2">
    {% for message in messages %}
    <div class="toast flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-sm font-medium max-w-sm
        {% if message.tags == 'success' %}bg-green-500 text-white
        {% elif message.tags == 'error' %}bg-red-500 text-white
        {% else %}bg-blue-500 text-white{% endif %}">
        <span class="flex-shrink-0 text-base">
            {% if message.tags == 'success' %}✅{% elif message.tags == 'error' %}❌{% else %}ℹ️{% endif %}
        </span>
        <span class="flex-1">{{ message }}</span>
        <button onclick="this.closest('.toast').remove()"
            class="flex-shrink-0 opacity-70 hover:opacity-100 transition ml-2 text-lg leading-none">×</button>
    </div>
    {% endfor %}
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toasts = document.querySelectorAll('.toast');
        toasts.forEach(function (toast, index) {
            setTimeout(function () {
                toast.classList.add('hide');
                setTimeout(function () { toast.remove(); }, 500);
            }, 3000 + index * 300); // ← 3 secondes
        });
    });
</script>
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
